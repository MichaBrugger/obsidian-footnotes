name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  # manual test run from the Actions tab: drafts a release named
  # <version>-manual-test. Drafts never create a git tag, so deleting the
  # draft afterwards leaves no trace.
  workflow_dispatch:

# gh release create needs write access even when the repo default is read-only
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Determine release tag
        id: tag
        run: |
          version="$(jq -r .version manifest.json)"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # suffix so a test run can't collide with a real release
            tag="$version-manual-test"
          else
            tag="${GITHUB_REF#refs/tags/}"
            # Obsidian requires the release tag to exactly match manifest.json's
            # version (no "v" prefix); fail fast instead of drafting a broken release
            if [ "$tag" != "$version" ]; then
              echo "Tag ($tag) does not match manifest.json version ($version)." >&2
              exit 1
            fi
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title="${{ steps.tag.outputs.tag }}" \
            --draft \
            main.js manifest.json styles.css
